<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0f17">
<title>DedicatusIT · Service Delivery OS</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<style>
:root{
 --bg:#0a0f17; --surface:#111824; --surface2:#0e151f; --raised:#16202e;
 --line:#222d3e; --line-soft:#1a2331;
 --ink:#e9eff7; --muted:#8a98aa; --faint:#586676;
 --accent:#1cb98c; --accent-deep:#0e7c66; --accent-ghost:rgba(28,185,140,.13);
 --green:#33c070; --amber:#efa92e; --red:#ef5b54;
 --green-g:rgba(51,192,112,.14); --amber-g:rgba(239,169,46,.14); --red-g:rgba(239,91,84,.16);
 --mono:ui-monospace,"SF Mono","JetBrains Mono","Roboto Mono",Menlo,Consolas,monospace;
 --ui:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
 --shadow:0 8px 24px rgba(0,0,0,.30);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--ui);font-size:13.5px;line-height:1.42;-webkit-font-smoothing:antialiased}
body{max-width:780px;margin:0 auto;min-height:100vh;padding-bottom:76px;background-image:radial-gradient(1100px 380px at 50% -130px, rgba(28,185,140,.06), transparent)}
h1,h2,h3,h4{margin:0;font-weight:650;letter-spacing:-.01em}
.eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);font-weight:600}
.muted{color:var(--muted)} .sm{font-size:12.5px} .xs{font-size:11px}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
button{font-family:var(--ui);cursor:pointer;border:none;border-radius:8px}
input,select,textarea{font-family:var(--ui);font-size:14px;width:100%;background:var(--surface2);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:9px 11px;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-ghost)}
textarea{resize:vertical;min-height:60px;line-height:1.5}
label.fld{display:block;margin:11px 0 4px;font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600}

header{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,var(--bg) 80%,rgba(10,15,23,0));padding:13px 16px 11px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.brand{display:flex;align-items:center;gap:11px}
.mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent-deep));display:grid;place-items:center;font-family:var(--mono);font-weight:700;color:#04140f;font-size:13px;letter-spacing:.02em;box-shadow:inset 0 1px 0 rgba(255,255,255,.25)}
.brand b{font-size:15px;letter-spacing:-.01em;display:block;line-height:1.1}
.brand .t{font-family:var(--mono);font-size:9px;color:var(--faint);letter-spacing:.22em;text-transform:uppercase}
#syncPill{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--muted);background:var(--surface);border:1px solid var(--line);border-radius:7px;padding:6px 11px;white-space:nowrap;cursor:pointer;letter-spacing:.02em}
#syncPill.ok{color:#7fe6c4;border-color:#1c5e4b} #syncPill.busy{color:#ffd98a;border-color:#5e4f1c} #syncPill.warn{color:#ffb0ab;border-color:#5e2b29}

main{padding:6px 16px 18px}
.hcell{display:flex;align-items:center;gap:8px}

.week{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin:10px 0 16px}
.week .w{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:12px 12px 10px;overflow:hidden}
.week .w:before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--line)}
.week .w.alert:before{background:var(--red)} .week .w.due:before{background:var(--amber)}
.week .n{font-family:var(--mono);font-size:26px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.week .w.alert .n{color:var(--red)} .week .w.due .n{color:var(--amber)}
.week .l{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:8px;letter-spacing:.08em;text-transform:uppercase;line-height:1.3}

.card{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:13px 14px;margin-bottom:10px;box-shadow:var(--shadow)}
.pcard{cursor:pointer;transition:border-color .12s,transform .06s}
.pcard:hover{border-color:#2e3c52} .pcard:active{transform:translateY(1px)}
.pcard.spine{border-left-width:3px}
.pcard.s-green{border-left-color:var(--green)} .pcard.s-amber{border-left-color:var(--amber)} .pcard.s-red{border-left-color:var(--red)}
.pc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.pc-top h3{font-size:15.5px;letter-spacing:-.01em}
.pc-sub{font-size:12px;color:var(--muted);margin-top:2px}
.dots{display:flex;gap:12px;margin-top:11px;flex-wrap:wrap;align-items:center}
.hd{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.dot{width:9px;height:9px;border-radius:3px;background:#3a4a60;display:inline-block;box-shadow:0 0 0 3px rgba(255,255,255,.03)}
.dot.green{background:var(--green)} .dot.amber{background:var(--amber)} .dot.red{background:var(--red)}
.badge{font-family:var(--mono);font-size:9.5px;font-weight:600;padding:3px 7px;border-radius:6px;letter-spacing:.05em;text-transform:uppercase;border:1px solid transparent}
.badge.gap{background:var(--red-g);color:#ffb4b0} .badge.due{background:var(--amber-g);color:#ffd98a} .badge.ok{background:var(--green-g);color:#9ee9bd} .badge.over{background:var(--red-g);color:#ffb4b0}
.pc-meta{display:flex;gap:12px;flex-wrap:wrap;margin-top:11px;font-family:var(--mono);font-size:10.5px;color:var(--muted);letter-spacing:.02em}
.pc-meta span{display:inline-flex;align-items:center;gap:5px}

.btn{background:var(--raised);color:var(--ink);border:1px solid var(--line);padding:9px 13px;border-radius:8px;font-weight:600;font-size:13px;transition:border-color .12s,background .12s}
.btn:hover{border-color:#33425a}
.btn.p{background:var(--accent-deep);border-color:var(--accent-deep);color:#eafff8}
.btn.p:hover{background:var(--accent)}
.btn.ghost{background:transparent}
.btn.sm{padding:6px 10px;font-size:12px}
.btn.full{width:100%;text-align:center}
.row{display:flex;gap:8px;flex-wrap:wrap}
.fab{position:fixed;right:16px;bottom:86px;z-index:30;background:var(--accent-deep);color:#eafff8;width:52px;height:52px;border-radius:15px;font-size:26px;box-shadow:var(--shadow);display:grid;place-items:center;border:1px solid var(--accent)}
@media(min-width:780px){.fab{right:calc(50% - 372px)}}

.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:25;background:rgba(10,15,23,.92);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);border-top:1px solid var(--line);display:flex;max-width:780px;margin:0 auto;padding:5px 6px env(safe-area-inset-bottom)}
.tabbar button{flex:1;background:none;color:var(--faint);padding:9px 4px 6px;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;position:relative}
.tabbar button.on{color:var(--accent)}
.tabbar button.on:before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:24px;height:2px;border-radius:2px;background:var(--accent)}
.tabbar svg{width:21px;height:21px}

.panel{position:fixed;inset:0;z-index:40;background:var(--bg);max-width:780px;margin:0 auto;overflow-y:auto;transform:translateY(100%);transition:transform .2s ease;padding-bottom:30px}
.panel.show{transform:translateY(0)}
.panel header{position:sticky;top:0;background:var(--bg);border-bottom:1px solid var(--line)}
.pbody{padding:14px 16px}
.seg{display:flex;gap:6px}
.seg button{flex:1;padding:9px;border:1px solid var(--line);background:var(--surface2);color:var(--muted);font-weight:600;font-size:12.5px;border-radius:8px;font-family:var(--mono);letter-spacing:.03em}
.seg button.g.on{background:var(--green-g);color:#9ee9bd;border-color:#2c6b46}
.seg button.a.on{background:var(--amber-g);color:#ffd98a;border-color:#7a5a16}
.seg button.r.on{background:var(--red-g);color:#ffb4b0;border-color:#7a2c2c}
.block{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:13px 14px;margin-bottom:11px}
.block h4{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;font-weight:600}
.kv{display:flex;justify-content:space-between;gap:10px;font-size:13px;padding:3px 0}
.kv b{font-weight:600}
.hint{font-size:12px;color:var(--muted);line-height:1.55;margin-top:9px;border-left:2px solid var(--line);padding-left:11px}
.check{display:flex;align-items:center;gap:10px;padding:7px 0;font-size:13.5px;border-bottom:1px solid var(--line-soft)}
.check:last-child{border-bottom:none}
.check input{width:18px;height:18px;flex:0 0 auto}
.logitem{font-size:12.5px;padding:9px 0;border-bottom:1px solid var(--line-soft);line-height:1.5}
.logitem:last-child{border-bottom:none}
.logitem .d{font-family:var(--mono);color:var(--faint);font-size:10px;text-transform:uppercase;letter-spacing:.05em}
.gapwarn{background:var(--red-g);border:1px solid #5e2b29;color:#ffc9c6;border-radius:9px;padding:9px 11px;font-size:12.5px;margin-top:10px}
.pill{display:inline-block;font-family:var(--mono);font-size:9.5px;font-weight:600;padding:3px 8px;border-radius:6px;background:var(--raised);color:var(--muted);border:1px solid var(--line);text-transform:uppercase;letter-spacing:.04em}
.empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:13px}
.empty b{color:var(--ink);display:block;font-size:15px;margin-bottom:6px}
.gd-card{display:flex;justify-content:space-between;align-items:center;gap:10px}
a.link{color:var(--accent);text-decoration:none}
.bar{height:6px;border-radius:6px;background:var(--surface2);overflow:hidden;border:1px solid var(--line)}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent-deep),var(--accent))}
.guide h3{font-size:14px;margin:16px 0 6px;letter-spacing:-.01em}
.guide p,.guide li{font-size:12.5px;color:#c4d0de;line-height:1.55}
.guide ul{margin:6px 0;padding-left:18px}
.chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10.5px;font-weight:600;background:var(--raised);border:1px solid var(--line);border-radius:7px;padding:4px 9px;color:var(--ink);letter-spacing:.02em}

/* ===== sidebar console shell ===== */
.app{display:flex;min-height:100vh;max-width:1180px;margin:0 auto}
.side{width:230px;flex:0 0 230px;background:var(--surface2);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.side-brand{display:flex;align-items:center;gap:11px;padding:18px 16px 16px}
.side-brand b{font-size:14px;line-height:1.1;display:block;letter-spacing:-.01em}
.side-brand .t{font-family:var(--mono);font-size:9px;color:var(--faint);letter-spacing:.22em;text-transform:uppercase}
.side-nav{display:flex;flex-direction:column;gap:2px;padding:8px}
.side-nav button{display:flex;align-items:center;gap:11px;width:100%;background:none;color:var(--muted);padding:10px 12px;border-radius:8px;font-size:13.5px;font-weight:600;text-align:left;letter-spacing:-.01em}
.side-nav button svg{width:18px;height:18px;flex:0 0 auto;opacity:.85}
.side-nav button:hover{background:var(--surface);color:var(--ink)}
.side-nav button.on{background:var(--accent-ghost);color:var(--accent)}
.side-foot{margin-top:auto;padding:14px;border-top:1px solid var(--line)}
.side-foot #syncPill{width:100%;text-align:center;display:block}
.content{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:15;background:linear-gradient(180deg,var(--bg) 82%,rgba(10,15,23,0));display:flex;align-items:flex-end;justify-content:space-between;gap:12px;padding:18px 20px 12px;border-bottom:1px solid var(--line)}
.page-eyebrow{font-family:var(--mono);font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);margin-bottom:3px}
.topbar h1{font-size:22px;letter-spacing:-.02em}
.actions{display:flex;gap:8px;flex-wrap:wrap}
#view{padding:18px 20px 48px}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:14px 14px 12px;position:relative;overflow:hidden}
.kpi:before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent-deep)}
.kpi.alert:before{background:var(--red)} .kpi.due:before{background:var(--amber)}
.kpi-n{font-family:var(--mono);font-size:28px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.kpi.alert .kpi-n{color:var(--red)} .kpi.due .kpi-n{color:var(--amber)}
.kpi-l{font-family:var(--mono);font-size:9.5px;color:var(--muted);margin-top:9px;letter-spacing:.08em;text-transform:uppercase}
.section-h{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);margin:22px 2px 11px;display:flex;align-items:center;gap:10px}
.section-h:after{content:"";flex:1;height:1px;background:var(--line)}
.block-h{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;font-weight:600}
.alert-row,.due-row{display:flex;align-items:center;gap:10px;padding:9px 2px;border-bottom:1px solid var(--line-soft);font-size:13px;cursor:pointer}
.alert-row:last-child,.due-row:last-child{border-bottom:none}
.alert-row:hover{color:var(--ink)}
.sev{width:8px;height:8px;border-radius:2px;flex:0 0 auto}
.sev.red{background:var(--red)} .sev.amber{background:var(--amber)} .sev.green{background:var(--green)}
.due-row .when{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
@media(max-width:820px){
 .app{flex-direction:column;max-width:780px}
 .side{width:auto;flex:none;height:auto;flex-direction:row;align-items:center;border-right:none;border-bottom:1px solid var(--line);z-index:20;overflow-x:auto}
 .side-brand{padding:11px 14px}
 .side-brand .t{display:none}
 .side-nav{flex-direction:row;padding:6px 8px;gap:4px;margin-left:auto}
 .side-nav button span{display:none}
 .side-nav button{padding:9px}
 .side-foot{margin:0;padding:8px 12px;border-top:none}
 .side-foot #syncPill{width:auto}
 .kpis{grid-template-columns:repeat(3,1fr)}
 .topbar{padding:14px 16px 10px}.topbar h1{font-size:19px}
 #view{padding:14px 16px 48px}
}

.ceo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
.ceo-stat{background:var(--surface2);border:1px solid var(--line);border-radius:9px;padding:10px}
.cs-n{font-family:var(--mono);font-size:20px;font-weight:700;font-variant-numeric:tabular-nums}
.cs-n.r{color:var(--red)}
.cs-l{font-family:var(--mono);font-size:8.5px;color:var(--muted);margin-top:5px;letter-spacing:.07em;text-transform:uppercase}
.hbar{display:flex;height:9px;border-radius:5px;overflow:hidden;margin-top:6px;border:1px solid var(--line)}
.hbar span:nth-child(1){background:var(--green)}.hbar span:nth-child(2){background:var(--amber)}.hbar span:nth-child(3){background:var(--red)}

.lsearch{margin:2px 0 8px}
.thinlist{max-height:54vh;overflow-y:auto;border:1px solid var(--line);border-radius:11px;background:var(--surface)}
.lrow{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--line-soft);cursor:pointer}
.lrow:last-child{border-bottom:none}
.lrow:hover{background:var(--surface2)}
.lrow.acct{background:var(--surface2)}
.lrow.acct b{font-size:13.5px}
.lrow.sub{padding-left:26px}
.lmain{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px;overflow:hidden}
.lmain b{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lsub{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hpips{display:flex;align-items:center;gap:3px;flex:0 0 auto}
.hpips .pl{font-family:var(--mono);font-size:8.5px;color:var(--faint);margin-right:5px}
.chev{color:var(--faint);font-size:16px;flex:0 0 auto;margin-left:2px}
.alert-row .chev{margin-left:auto}

.pcard.s-unknown{border-left-color:#3a4a60}
.trow{display:flex;gap:3px;margin-top:5px;align-items:center;flex-wrap:wrap}
.tpip{width:13px;height:8px;border-radius:2px;background:#3a4a60;display:inline-block}
.tpip.green{background:var(--green)}.tpip.amber{background:var(--amber)}.tpip.red{background:var(--red)}
.actl{display:flex;align-items:center;gap:8px;flex:1;min-width:0;font-size:13px}
.actl input{width:16px;height:16px;flex:0 0 auto}

.info{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;border:1px solid var(--line);color:var(--muted);font-size:9px;font-style:italic;font-weight:700;font-family:var(--ui);cursor:pointer;vertical-align:middle;margin-left:5px;text-transform:none;letter-spacing:0}
.info:hover{border-color:var(--accent);color:var(--accent)}
.fldhint{font-size:11.5px;color:var(--muted);line-height:1.45;margin:4px 0 2px;border-left:2px solid var(--accent-deep);padding-left:9px}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="side-brand"><div class="mark">SD</div><div><b>Service Delivery OS</b><div class="t">DedicatusIT</div></div></div>
    <nav class="side-nav">
      <button data-tab="dashboard" class="on" onclick="go('dashboard')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg><span>Dashboard</span></button>
      <button data-tab="training" onclick="go('training')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 10L12 5 2 10l10 5 10-5z"/><path d="M6 12v5c0 1 2 2 6 2s6-1 6-2v-5"/></svg><span>Knowledge Base</span></button>
      <button data-tab="guide" onclick="go('guide')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg><span>Guide</span></button>
      <button data-tab="settings" onclick="go('settings')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span>Settings</span></button>
    </nav>
    <div class="side-foot"><div id="syncPill" onclick="GD.connectOrSync()">Local</div></div>
  </aside>
  <div class="content">
    <header class="topbar">
      <div><div class="page-eyebrow" id="pageEyebrow">Service delivery</div><h1 id="pageTitle">Dashboard</h1></div>
      <div class="actions" id="actionRow"></div>
    </header>
    <main id="view"></main>

<script>
/* ============ DedicatusIT Service Delivery OS (v2) ============
   Model: Account (MSP) -> Seats (techs). Two-sided health per seat, rolled up.
   RBAC-ready: each ACCOUNT carries `sdm` (owner) and data maps to DB rows. */
const LS="dedicatusit_sdos_v1";
const CONFIG={ googleClientId:"829111234642-lh1pqlen2lnoe6mv1hu998r3bg3gedrj.apps.googleusercontent.com",
  scopes:"https://www.googleapis.com/auth/drive.appdata" };
const FILENAME="dedicatusit-sdos.json";
const HEALTH=["green","amber","red"];
const CONT=[["docs","Environment documented"],["runbooks","Recurring tasks / runbooks written"],
  ["shared","Docs in a shared place, not their head"],["relief","Relief person identified"],["plan","Transition plan exists"]];
const SECTIONS=[["systems","System & client information","Environments, key systems, where access/credentials live (pointers, not secrets), sites, vendors"],
 ["routine","Day-to-day routine work","The recurring rhythm — daily / weekly / monthly tasks, what 'normal' looks like"],
 ["issues","Recurring issues & how they're handled","Known gremlins, workarounds, 'when X happens, do Y'"],
 ["runbooks","Runbooks for the non-obvious","Step-by-step for procedures a backfill couldn't guess"],
 ["contacts","Key contacts & relationships","Who to talk to for what — MSP side and client side; relief person"],
 ["open","Open threads / in-flight","Projects underway, things mid-resolution"]];
const STALE_DAYS=90;
const MSPQ=[["attendees","Who was on the call?","Names and roles on the call — MSP side and ours. Tracks who's engaged in the relationship."],["metrics","Delivery metrics — tickets handled, SLA %, CSAT, escalations","The hard numbers this period: tickets handled, SLA % met, CSAT score, and any escalations. Facts, not impressions."],["performance","How is the tech performing?","The MSP's view of the tech — speed, quality, communication, reliability."],["wins","Wins / what went well","Specific good moments — name them so you can recognise the tech and reinforce your value."],["friction","Friction or concerns","Anything rubbing: complaints, slow areas, unmet expectations — capture it even if said lightly."],["decisions","Decisions made","Anything you agreed or settled on the call, so it's on the record."],["actions","Actions — owner · due date","Next steps: what, who owns it, and by when. These feed the action tracker."],["risks","Risks / watch items","Anything that could hurt the placement or relationship if ignored — to revisit next time. E.g. workload creeping, a quiet complaint, a budget question, a key contact leaving."],["expansion","Expansion signals / more they'd hand over","Signs they'd give you more work: 'could your person also…', 'we're swamped in X'. Your earliest growth signal — it feeds the QBR and the stickiness read."]];
const TECHQ=[["workload","Is the workload sustainable?","Is the load healthy or heading toward burnout? Hours, volume, pressure."],["morale","Morale / energy","Their energy and mood — motivated, flat, or frustrated?"],["blockers","Blockers / what they need","What's in their way, or what they need from us to do the job well."],["growth","Growing — toward what?","What they're learning or want to grow toward — feeds their development plan."],["recognition","Wins worth recognising","Things worth calling out — used to thank and recognise them (and in the recognition note)."],["actions","Actions — owner · due date","Next steps for you or the tech, with owner and due date."],["unsaid","Anything they're not saying to the MSP?","The quiet signal — anything they're holding back from the client. This is what protects the placement. Stays internal, never shown to the MSP or the tech."]];
const QBRQ=[["attendees","Who attended","Who joined the review — both sides."],["summary","Executive summary","The headline of the quarter in a few lines — the story you want the client to remember."],["metrics","Delivery metrics (tickets, SLA %, CSAT, escalations)","The quarter's delivery numbers, pulled together from your cadences."],["wins","Wins this quarter","The quarter's highlights — auto-gathered from cadence wins; trim to the strongest."],["issues","Issues & friction","Problems over the quarter and how they were handled — shows you stay on top of things."],["decisions","Decisions","Key decisions made this quarter."],["actions","Actions — owner · due date","Agreed next steps with owners and due dates."],["roadmap","Roadmap / next quarter","What's planned next — where the relationship goes from here."],["expansion","Expansion opportunities","Where you could do more for this client — the growth conversation."]];
const WEEKLY_KT=["What did your week's routine look like — anything new a stand-in would want to know?","Hit any new issue or quirk? How did you sort it?","Anything change on the client's systems, access, or vendors?","Anything in flight right now that someone should pick up if you were off next week?"];
const MONTHLY_KT=["Your systems & client info — anything new since last month (systems, access, vendors, sites)?","Your day-to-day routine — still accurate? what would you add?","Any recurring issue or workaround worth writing down so you're not the only one who knows it?","Did you do anything this month that isn't written down but a stand-in would need?","Any new key contacts, or changed responsibilities?","What's in flight right now?"];
function secAge(sec){if(!sec||!sec.updated)return null;return Math.round((new Date(today())-new Date(sec.updated))/86400000);}
function secStatus(sec){if(!sec||!sec.text||!String(sec.text).trim())return "empty";const a=secAge(sec);return (a!==null&&a>STALE_DAYS)?"stale":"fresh";}
let state=null, TAB="dashboard", openA=null, openS=null;
var dashQuery="", dashFilter="";

function today(){return new Date().toISOString().slice(0,10);}
function addDays(iso,n){const d=iso?new Date(iso):new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function daysTo(iso){if(!iso)return null;return Math.round((new Date(iso)-new Date(today()))/86400000);}
function fmt(iso){if(!iso)return "—";const d=new Date(iso);return d.toLocaleDateString(undefined,{day:"numeric",month:"short",year:"numeric"});}
function uid(x){return (x||"x")+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){return (s==null?'':String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function blankSeat(){const bf={};SECTIONS.forEach(([k])=>bf[k]={text:"",updated:""});return {id:uid("s"),tech:"",title:"",band:"",started:"",status:"active",
  health:{msp:"",tech:"",note:"",updated:""},cadence:{freq:14,last:"",next:""},pulse:{last:"",next:""},rate:"",renewal:"",actions:[],
  mspLog:[],techLog:[],backfill:bf,growth:{goal:"",lastConvo:""},log:[]};}
function blankAccount(){return {id:uid("a"),name:"",sdm:state&&state.me?state.me.name:"",started:"",status:"active",
  qbr:{last:"",next:"",notes:""},expansion:[],log:[],seats:[]};}

function seed(){
  const a=blankAccount(); a.name="First MSP (rename)"; a.sdm="Salil"; a.started="2026-04-01";
  a.qbr={last:"",next:addDays(today(),60),notes:""};
  a.log=[{date:today(),type:"note",note:"Account opened Apr 2026. Bi-weekly client cadence just started."}];
  const s=blankSeat(); s.tech="Sr Lead Tech"; s.band="Senior Lead"; s.started="2026-04-01";
  s.health={msp:"green",tech:"green",note:"",updated:today()};
  s.cadence={freq:14,last:today(),next:addDays(today(),14)}; s.pulse={last:"",next:addDays(today(),7)};
  s.log=[{date:today(),type:"note",note:"Devices/users managed via Entra + Intune."}];
  a.seats=[s];
  return {v:2,updatedAt:new Date().toISOString(),me:{name:"Salil",email:"",role:"owner"},accounts:[a],training:[],settings:{weeklyFormUrl:"",monthlyFormUrl:""}};
}

/* migrate v1 (flat placements) -> v2 (accounts->seats); also normalises */
function normalize(s){
  if(!s) return seed();
  if(s.accounts){ s.accounts.forEach(a=>{a.seats=a.seats||[];a.expansion=a.expansion||[];a.log=a.log||[];a.qbr=a.qbr||{last:"",next:"",notes:""};
    a.seats.forEach(fixSeat);}); if(!s.me)s.me={name:"",email:"",role:"owner"}; if(!s.training)s.training=[]; s.v=2; return s; }
  if(s.placements){ const map={};
    s.placements.forEach(p=>{ const key=(p.client||"Untitled").trim().toLowerCase();
      if(!map[key]){const a=blankAccount();a.name=p.client||"Untitled";a.sdm=p.sdm||"";a.started=p.started||"";a.expansion=p.expansion||[];map[key]=a;}
      const seat=blankSeat(); seat.id=p.id||uid("s"); seat.tech=p.tech||""; seat.band=p.band||""; seat.started=p.started||"";
      seat.health=p.health||seat.health; seat.cadence=p.cadence||seat.cadence; seat.pulse=p.pulse||seat.pulse;
      seat.continuity=p.continuity||seat.continuity; seat.growth=p.growth||seat.growth; seat.log=p.log||[];
      map[key].seats.push(seat); });
    return {v:2,updatedAt:s.updatedAt||new Date().toISOString(),me:s.me||{name:"",email:"",role:"owner"},accounts:Object.values(map),training:s.training||[]};
  }
  return seed();
}
function fixSeat(s){s.health=s.health||{msp:"",tech:"",note:"",updated:""};s.cadence=s.cadence||{freq:14,last:"",next:""};
  s.pulse=s.pulse||{last:"",next:""};s.title=s.title||"";s.mspLog=s.mspLog||[];s.techLog=s.techLog||[];
  s.backfill=s.backfill||{};SECTIONS.forEach(([k])=>{if(!s.backfill[k])s.backfill[k]={text:"",updated:""};});
  s.growth=s.growth||{goal:"",lastConvo:""};s.log=s.log||[];s.rate=s.rate||"";s.renewal=s.renewal||"";s.actions=s.actions||[];}

function load(){let s;try{const r=localStorage.getItem(LS);s=r?JSON.parse(r):null;}catch(e){s=null;}state=normalize(s);if(!state.settings)state.settings={weeklyFormUrl:"",monthlyFormUrl:""};if(!state.training)state.training=[];}
function save(){state.updatedAt=new Date().toISOString();try{localStorage.setItem(LS,JSON.stringify(state));}catch(e){}
  if(GD.ready&&GD.signedIn){clearTimeout(GD._t);GD._t=setTimeout(()=>GD.push(),1200);setSync("busy","Saving…");}}
function getA(id){return state.accounts.find(a=>a.id===id);}
function getS(a,sid){return a.seats.find(s=>s.id===sid);}

/* ---- computed ---- */
const RANK={green:0,amber:1,red:2,"":0};
function gap(s){return s.health.msp&&s.health.tech&&s.health.msp!==s.health.tech;}
function worstSeat(s){return Math.max(RANK[s.health.msp],RANK[s.health.tech]);}
function cadDue(s){return s.cadence.next?daysTo(s.cadence.next):null;}
function pulseDue(s){return s.pulse.next?daysTo(s.pulse.next):null;}
function readiness(s){if(!s.backfill)return 0;const fresh=SECTIONS.filter(([k])=>secStatus(s.backfill[k])==="fresh").length;return Math.round(fresh/SECTIONS.length*100);}
function seatAtt(s){let x=worstSeat(s)*10;if(gap(s))x+=8;const c=cadDue(s);if(c!==null&&c<0)x+=6;else if(c!==null&&c<=2)x+=3;const p=pulseDue(s);if(p!==null&&p<0)x+=4;else if(p!==null&&p<=1)x+=2;return x;}
function acctWorst(a){return a.seats.length?Math.max.apply(null,a.seats.map(worstSeat)):0;}
function acctGap(a){return a.seats.some(gap);}
function qbrDue(a){return a.qbr.next?daysTo(a.qbr.next):null;}
function acctAtt(a){let x=a.seats.reduce((t,s)=>t+seatAtt(s),0);const q=qbrDue(a);if(q!==null&&q<0)x+=5;return x;}
function badgeFor(rank){return rank===2?'<span class="badge over">red</span>':rank===1?'<span class="badge due">amber</span>':'<span class="badge ok">green</span>';}
function dot(v){return '<span class="dot '+(v||'')+'"></span>';}
function fldHint(text,hint){return '<label class="fld">'+esc(text)+(hint?' <span class="info" title="'+esc(hint)+'" onclick="toggleHint(this)">i</span>':'')+'</label>'+(hint?'<div class="fldhint" style="display:none">'+esc(hint)+'</div>':'');}
function toggleHint(el){var lab=el.parentNode;var h=lab.nextElementSibling;if(h&&h.classList&&h.classList.contains('fldhint')){h.style.display=(h.style.display==='none'?'block':'none');}}
const HEALTH_STALE=30;
function healthAge(s){return s.health&&s.health.updated?Math.max(0,Math.floor((Date.now()-Date.parse(s.health.updated))/86400000)):null;}
function healthSet(s){return !!(s.health&&(s.health.msp||s.health.tech));}
function healthStale(s){var a=healthAge(s);return healthSet(s)&&a!==null&&a>HEALTH_STALE;}
function healthUnknown(s){return !healthSet(s)||healthStale(s);}
function needsAttn(s){return worstSeat(s)===2||gap(s)||healthUnknown(s);}
function seatColor(s){return healthUnknown(s)?'':['green','amber','red'][worstSeat(s)];}
function dotFor(s,side){return healthUnknown(s)?'<span class="dot"></span>':dot(s.health[side]);}
function badgeForSeat(s){return healthUnknown(s)?'<span class="badge due">check-in</span>':badgeFor(worstSeat(s));}
/* money */
function seatMRR(s){var n=parseFloat(s.rate);return (s.status!=="ended"&&!isNaN(n))?n:0;}
function acctMRR(a){return (a.seats||[]).reduce(function(t,s){return t+seatMRR(s);},0);}
function totalMRR(){return state.accounts.reduce(function(t,a){return t+acctMRR(a);},0);}
function money(n){return "$"+Math.round(n||0).toLocaleString();}
function renewalDue(s){return s.renewal?daysTo(s.renewal):null;}
/* health trend from cadence history */
function healthSeries(s,kind){var arr=kind==="msp"?(s.mspLog||[]):(s.techLog||[]);var f=kind==="msp"?"satisfaction":"engagement";return arr.filter(function(e){return e[f];}).sort(function(a,b){return a.date<b.date?-1:1;}).map(function(e){return {date:e.date,v:e[f]};});}
function trendArrow(s){var m=healthSeries(s,"msp");if(m.length<2)return "";var a=RANK[m[m.length-2].v],b=RANK[m[m.length-1].v];return b<a?'<span style="color:var(--green)">▲ improving</span>':b>a?'<span style="color:var(--red)">▼ slipping</span>':'<span class="muted">steady</span>';}
function trendStrip(s,kind){var ser=healthSeries(s,kind);if(!ser.length)return '<span class="muted xs">no history yet</span>';return ser.slice(-10).map(function(p){return '<span class="tpip '+p.v+'" title="'+fmt(p.date)+'"></span>';}).join('');}
/* recognition stats */
function techStats(s){var msp=(s.mspLog||[]);var greens=msp.filter(function(e){return e.satisfaction==="green";}).length;var total=msp.filter(function(e){return e.satisfaction;}).length;
  var wins=[];msp.forEach(function(e){if(e.wins)wins.push(e.wins);});(s.techLog||[]).forEach(function(e){if(e.recognition)wins.push(e.recognition);});
  return {score:total?Math.round(greens/total*100):null,greens:greens,total:total,wins:wins,articles:modulesByAuthor(s.tech),tenure:s.started?Math.floor((Date.now()-Date.parse(s.started))/86400000/30):null};}

/* ============ nav ============ */
var PAGES={dashboard:["Service delivery","Dashboard"],training:["Knowledge base","Templates & articles"],guide:["Reference","Operating guide"],settings:["Configuration","Settings"]};
function actionFor(tab){
  if(tab==="dashboard")return '<button class="btn p" onclick="openAcctForm()">+ New MSP</button>';
  if(tab==="training")return '<button class="btn p" onclick="openModule()">+ New article</button>';
  return '';
}
function go(tab){TAB=tab;
  document.querySelectorAll(".side-nav button").forEach(function(b){b.classList.toggle("on",b.dataset.tab===tab);});
  var p=PAGES[tab]||["",tab];var pe=document.getElementById("pageEyebrow");if(pe)pe.textContent=p[0];var pt=document.getElementById("pageTitle");if(pt)pt.textContent=p[1];
  var ar=document.getElementById("actionRow");if(ar)ar.innerHTML=actionFor(tab);
  render();}
function render(){var v=document.getElementById("view");
  v.innerHTML = TAB==="dashboard"?renderDashboard(): TAB==="guide"?renderGuide(): TAB==="training"?renderTraining(): renderSettings();}
function renderDashboard(){
  var accts=state.accounts.slice().sort(function(a,b){return acctAtt(b)-acctAtt(a);});
  var seats=[];accts.forEach(function(a){a.seats.forEach(function(s){seats.push({a:a,s:s});});});
  var attN=seats.filter(function(x){return needsAttn(x.s);}).length;
  var cadN=seats.filter(function(x){var c=cadDue(x.s);return c!==null&&c<=2;}).length;
  var pulN=seats.filter(function(x){var c=pulseDue(x.s);return c!==null&&c<=1;}).length;
  var kpis=[[accts.length,"Accounts","",""],[seats.length,"Seats","",""],[attN,"Need attention",attN?"alert":"","attention"],[cadN,"Cadence due",cadN?"due":"","cadence"],[pulN,"Pulse due",pulN?"due":"","pulse"]];
  var kpiHtml='<div class="kpis">'+kpis.map(function(k){return '<div class="kpi '+k[2]+'" style="cursor:pointer" onclick="dashSet(\''+k[3]+'\')"><div class="kpi-n">'+k[0]+'</div><div class="kpi-l">'+k[1]+'</div></div>';}).join('')+'</div>';
  var acctSection='<div class="section-h">Accounts &amp; seats</div>'+
    '<input id="dashSearch" class="lsearch" placeholder="Search MSP or technician…" value="'+esc(dashQuery)+'" oninput="dashApply()">'+
    '<div id="dashFilterBar">'+filterBar()+'</div>'+
    '<div id="acctList" class="thinlist">'+buildAcctList()+'</div>';
  var alerts=[];
  seats.forEach(function(x){var s=x.s,a=x.a;
    if(healthUnknown(s))alerts.push(['','— '+esc(s.tech||'Seat')+' · '+esc(a.name)+' — '+healthReason(s),a.id,s.id]);
    else if(worstSeat(s)===2)alerts.push(['red',esc(s.tech||'Seat')+' · '+esc(a.name)+' — '+healthReason(s),a.id,s.id]);
    else if(gap(s))alerts.push(['amber',esc(s.tech||'Seat')+' · '+esc(a.name)+' — '+healthReason(s),a.id,s.id]);
    var c=cadDue(s);if(c!==null&&c<0)alerts.push(['amber','Cadence '+(-c)+'d overdue · '+esc(s.tech||'seat')+' ('+esc(a.name)+')',a.id,s.id]);
    var rd=renewalDue(s);if(rd!==null&&rd<=60)alerts.push([rd<0?'red':'amber','Renewal '+(rd<0?(-rd)+'d overdue':'in '+rd+'d')+' · '+esc(s.tech||'seat')+' ('+esc(a.name)+')',a.id,s.id]);});
  accts.forEach(function(a){var q=qbrDue(a);if(q!==null&&q<0)alerts.push(['amber','QBR '+(-q)+'d overdue · '+esc(a.name),a.id,null]);});
  var alertHtml='<div class="card"><div class="block-h">Alerts</div>'+(alerts.length?alerts.map(function(al){return '<div class="alert-row" onclick="'+(al[3]?'openSeat(\''+al[2]+'\',\''+al[3]+'\')':'openAccount(\''+al[2]+'\')')+'"><span class="sev '+al[0]+'"></span>'+al[1]+'<span class="chev">›</span></div>';}).join(''):'<div class="muted sm">All clear — nothing needs attention right now.</div>')+'</div>';
  var due=[];
  seats.forEach(function(x){var s=x.s,a=x.a;
    var c=cadDue(s);if(c!==null&&c<=2)due.push(['cadence',a.id,s.id,esc(s.tech||'seat'),esc(a.name),c]);
    var p=pulseDue(s);if(p!==null&&p<=1)due.push(['pulse',a.id,s.id,esc(s.tech||'seat'),esc(a.name),p]);});
  var dueHtml='<div class="card"><div class="block-h">Today &amp; this week</div>'+(due.length?due.map(function(d){
    var label=d[0]==='cadence'?'MSP cadence':'Tech pulse';var when=d[5]<0?(-d[5])+'d overdue':(d[5]===0?'today':'in '+d[5]+'d');var fn=d[0]==='cadence'?'openMspForm':'openTechForm';
    return '<div class="due-row"><span class="sev '+(d[5]<0?'red':'amber')+'"></span><span>'+label+' · '+d[3]+' ('+d[4]+')</span><span class="when">'+when+'</span><button class="btn sm" onclick="'+fn+'(\''+d[1]+'\',\''+d[2]+'\')">Log</button></div>';
  }).join(''):'<div class="muted sm">Nothing due — you\'re on top of the cadences.</div>')+'</div>';
  if(!accts.length)return kpiHtml+'<div class="empty"><b>No accounts yet.</b>Add an MSP to start tracking placements.<br><br><button class="btn p" onclick="openAcctForm()">+ New MSP</button></div>';
  return kpiHtml+acctSection+stickinessPanel(accts)+commercialPanel(accts)+openActionsPanel(accts)+alertHtml+dueHtml+ceoPanel(accts);
}
function commercialPanel(accts){
  var mrr=accts.reduce(function(t,a){return t+acctMRR(a);},0);
  var billing=0;accts.forEach(function(a){a.seats.forEach(function(s){if(seatMRR(s)>0)billing++;});});
  var ren=[];accts.forEach(function(a){a.seats.forEach(function(s){var d=renewalDue(s);if(d!==null&&d<=60)ren.push([d,a,s]);});});
  ren.sort(function(x,y){return x[0]-y[0];});
  var exp=accts.reduce(function(t,a){return t+((a.expansion||[]).length);},0);
  return '<div class="card"><div class="block-h">Commercials</div>'+
    '<div class="ceo-grid" style="margin-top:0"><div class="ceo-stat"><div class="cs-n">'+money(mrr)+'</div><div class="cs-l">Monthly recurring</div></div>'+
    '<div class="ceo-stat"><div class="cs-n">'+billing+'</div><div class="cs-l">Billing seats</div></div>'+
    '<div class="ceo-stat"><div class="cs-n'+(ren.length?' r':'')+'">'+ren.length+'</div><div class="cs-l">Renewals ≤60d</div></div></div>'+
    (ren.length?'<div style="margin-top:10px">'+ren.map(function(r){return '<div class="due-row" onclick="openSeat(\''+r[1].id+'\',\''+r[2].id+'\')"><span class="sev '+(r[0]<0?'red':'amber')+'"></span><span>'+esc(r[2].tech||'seat')+' · '+esc(r[1].name)+'</span><span class="when">'+(r[0]<0?(-r[0])+'d overdue':'in '+r[0]+'d')+'</span><span class="chev">›</span></div>';}).join('')+'</div>':'')+
    '</div>';
}
function openActionsPanel(accts){
  var items=[];accts.forEach(function(a){a.seats.forEach(function(s){(s.actions||[]).forEach(function(ac){if(!ac.done)items.push([a,s,ac]);});});});
  if(!items.length)return '';
  items.sort(function(x,y){var dx=x[2].due||'9999',dy=y[2].due||'9999';return dx<dy?-1:1;});
  return '<div class="card"><div class="block-h">Open actions ('+items.length+')</div>'+items.map(function(it){var ac=it[2];var od=ac.due&&daysTo(ac.due)<0;return '<div class="due-row" onclick="openSeat(\''+it[0].id+'\',\''+it[1].id+'\')"><span class="sev '+(od?'red':'amber')+'"></span><span>'+esc(ac.text)+(ac.owner?' · '+esc(ac.owner):'')+' <span class="muted xs">('+esc(it[1].tech||'seat')+')</span></span><span class="when">'+(ac.due?(od?(-daysTo(ac.due))+'d over':fmt(ac.due)):'—')+'</span><span class="chev">›</span></div>';}).join('')+'</div>';
}
function healthReason(s){
  if(!healthSet(s))return "no health logged yet — needs a check-in";
  if(healthStale(s))return "health stale — last set "+healthAge(s)+"d ago, needs a check-in";
  var m=s.health.msp||"",t=s.health.tech||"";var parts=[];
  if(gap(s))parts.push("gap — MSP "+(m||"—")+" / Tech "+(t||"—"));
  else parts.push("MSP "+(m||"—")+" · Tech "+(t||"—"));
  if(RANK[m]===2)parts.push("MSP unhappy");
  if(RANK[t]===2)parts.push("tech struggling");
  var c=cadDue(s);if(c!==null&&c<0)parts.push("cadence "+(-c)+"d overdue");
  var p=pulseDue(s);if(p!==null&&p<0)parts.push("pulse "+(-p)+"d overdue");
  return parts.join(" · ");
}

function buildAcctList(){

function avg(arr){return arr.length?arr.reduce(function(t,x){return t+x;},0)/arr.length:0;}
function expDays(a){var ds=(a.expansion||[]).map(function(e){return e.date;}).filter(Boolean).sort();if(!ds.length)return null;return Math.floor((Date.now()-Date.parse(ds[ds.length-1]))/86400000);}
function stickiness(a){
  var seats=a.seats||[];
  if(!seats.length)return {score:0,label:"No seats",action:"Add the placed technician to start reading this relationship.",ready:false,risk:false,reasons:[],drags:[]};
  var G={green:1,amber:0.5,red:0,"":0.3};
  var mv=function(s,side){return G[healthUnknown(s)?"":(s.health[side]||"")];};
  var fHealth=avg(seats.map(function(s){return mv(s,"msp");}));
  var fTrend=avg(seats.map(function(s){var ser=healthSeries(s,"msp");if(ser.length<2)return 0.5;var d=RANK[ser[ser.length-2].v]-RANK[ser[ser.length-1].v];return d>0?1:(d<0?0.1:0.6);}));
  var fCont=avg(seats.map(function(s){return readiness(s)/100;}));
  var fSeats=seats.length>=2?1:0.45;
  var ed=expDays(a);var fExp=ed===null?0.1:(ed<=90?1:(ed<=180?0.6:0.3));
  var cadOn=avg(seats.map(function(s){var d=cadDue(s);return (d===null||d>=0)?1:0;}));
  var qd=qbrDue(a);var qbrOn=(qd===null||qd>=0)?1:0;var fRhythm=cadOn*0.6+qbrOn*0.4;
  var ten=Math.max.apply(null,seats.map(function(s){return s.started?Math.floor((Date.now()-Date.parse(s.started))/86400000/30):0;}));
  var fTen=ten>=12?1:(ten>=6?0.8:(ten>=3?0.6:0.4));
  var fTech=avg(seats.map(function(s){return mv(s,"tech");}));
  var fTenTech=fTen*0.5+fTech*0.5;
  var score=Math.round(fHealth*25+fTrend*10+fCont*15+fSeats*10+fExp*15+fRhythm*15+fTenTech*10);
  var label=score>=75?"Sticky":score>=55?"Solid":score>=40?"Watch":"At-risk";
  var risk=score<40;
  var renSoon=null;seats.forEach(function(s){var r=renewalDue(s);if(r!==null&&r<=60&&(renSoon===null||r<renSoon))renSoon=r;});
  var action="",ready=false;
  if(renSoon!==null&&fHealth<0.75){action="Renewal in "+renSoon+"d with soft health — schedule a save conversation before it lands.";}
  else if(risk||fTrend<0.3){action="Drifting — health "+(fTrend<0.3?"is slipping":"is weak")+". Bring a concrete value idea to the next call and re-engage.";}
  else if(seats.some(gap)){action="Two-sided gap — the MSP is cooler than the tech realises. Clear the friction before it surfaces at renewal.";}
  else if(qd!==null&&qd<0){action="QBR overdue — hold the review; it's your best moment to reinforce value and surface expansion.";}
  else if(cadOn<1){action="Cadence slipping — re-establish the rhythm; engagement is how stickiness is held.";}
  else if(fCont<0.4){action="Shallow knowledge ("+Math.round(fCont*100)+"% continuity) — get the tech's KB articles in so you'd genuinely be missed.";}
  else if(score>=55&&ed!==null&&ed<=90){action="Expansion-ready — they're leaning in (a signal "+ed+"d ago). Propose "+(seats.length<2?"a second seat":"the next scope")+".";ready=true;}
  else if(score>=55&&seats.length<2){action="Solid and single-seat — float a second seat or an added service; the relationship can take more.";ready=true;}
  else if(ed===null||ed>180){action="Plateaued — no new scope in a while. Proactively bring a value idea to keep the account growing.";}
  else{action="Healthy — protect the rhythm and keep listening for what else they'd hand over.";}
  var F=[["Client health",fHealth],["Trend",fTrend],["Continuity depth",fCont],["Multiple seats",fSeats],["Expansion momentum",fExp],["Cadence/QBR rhythm",fRhythm],["Tenure & engagement",fTenTech]];
  return {score:score,label:label,action:action,ready:ready,risk:risk,reasons:F.filter(function(x){return x[1]>=0.75;}).map(function(x){return x[0];}),drags:F.filter(function(x){return x[1]<0.45;}).map(function(x){return x[0];})};
}

/* ---- seat actions ---- */
function reSeat(aid,sid){const a=getA(aid);document.getElementById("panelInner").innerHTML=seatDetail(a,getS(a,sid));}
function setHealth(aid,sid,side,v){const s=getS(getA(aid),sid);s.health[side]=v;s.health.updated=today();save();reSeat(aid,sid);}
function markCad(aid,sid){const s=getS(getA(aid),sid);s.cadence.last=today();s.cadence.next=addDays(today(),s.cadence.freq);s.log.push({date:today(),type:"cadence",note:"MSP cadence held."});save();reSeat(aid,sid);toast("Cadence logged");}
function markPulse(aid,sid){const s=getS(getA(aid),sid);s.pulse.last=today();s.pulse.next=addDays(today(),7);s.log.push({date:today(),type:"pulse",note:"Tech pulse held."});save();reSeat(aid,sid);toast("Pulse logged");}
function toggleCont(aid,sid,k){const s=getS(getA(aid),sid);s.continuity[k]=!s.continuity[k];save();reSeat(aid,sid);}
function setGrowth(aid,sid,v){getS(getA(aid),sid).growth.goal=v;save();}
function logGrowth(aid,sid){const s=getS(getA(aid),sid);s.growth.lastConvo=today();s.log.push({date:today(),type:"growth",note:"Growth conversation held."});save();reSeat(aid,sid);toast("Logged");}
function addSNote(aid,sid){const v=document.getElementById("snoteIn").value.trim();if(!v)return;const s=getS(getA(aid),sid);s.log.push({date:today(),type:"note",note:v});save();reSeat(aid,sid);}
function delSeat(aid,sid){if(!confirm("Remove this seat?"))return;const a=getA(aid);a.seats=a.seats.filter(s=>s.id!==sid);save();openAccount(aid);}

/* ---- account actions ---- */
function reAcct(aid){document.getElementById("panelInner").innerHTML=acctDetail(getA(aid));}
function markQBR(aid){const a=getA(aid);a.qbr.last=today();a.qbr.next=addDays(today(),90);a.log.push({id:uid("l"),date:today(),type:"qbr",note:"QBR held."});save();reAcct(aid);toast("QBR logged");}
function unmarkQBR(aid){const a=getA(aid);if(!confirm("Undo the last QBR mark? (The dates stay editable below.)"))return;a.qbr.last="";save();reAcct(aid);toast("Undone");}
function setQbr(aid,field,v){const a=getA(aid);a.qbr[field]=v;save();reAcct(aid);}
function clearGrowth(aid,sid){const s=getS(getA(aid),sid);if(!confirm("Clear the last growth-conversation date?"))return;s.growth.lastConvo="";save();reSeat(aid,sid);toast("Cleared");}
function addAction(aid,sid){var t=((document.getElementById("actText")||{}).value||"").trim();if(!t)return;var s=getS(getA(aid),sid);s.actions=s.actions||[];s.actions.push({id:uid("ac"),text:t,owner:((document.getElementById("actOwner")||{}).value||"").trim(),due:((document.getElementById("actDue")||{}).value||""),done:false,created:today()});save();reSeat(aid,sid);toast("Action added");}
function toggleAction(aid,sid,id){var s=getS(getA(aid),sid);var ac=(s.actions||[]).filter(function(x){return x.id===id;})[0];if(ac){ac.done=!ac.done;ac.doneAt=ac.done?today():"";}save();reSeat(aid,sid);}
function delAction(aid,sid,id){if(!confirm("Delete this action?"))return;var s=getS(getA(aid),sid);s.actions=(s.actions||[]).filter(function(x){return x.id!==id;});save();reSeat(aid,sid);}
function recognitionDoc(aid,sid,mode){var a=getA(aid),s=getS(a,sid);var t=techStats(s);
  var title="Recognition \u2014 "+(s.tech||"our technician");
  var sub=(s.title?s.title+" \u00b7 ":"")+(a.name||"")+(t.tenure!=null?" \u00b7 "+t.tenure+" month"+(t.tenure===1?"":"s")+" with us":"");
  var secs=[["Thank you","Thank you for the work you do for "+(a.name||"the client")+". Here is some of what stood out."]];
  if(t.tenure!=null)secs.push(["Tenure",t.tenure+" months embedded with "+(a.name||"the account")]);
  if(t.greens>0)secs.push(["Positive client feedback",t.greens+" positive check-in"+(t.greens===1?"":"s")+" from the client"]);
  if(t.articles.length)secs.push(["Knowledge you have shared",t.articles.length+" KB article"+(t.articles.length===1?"":"s")+": "+t.articles.map(function(m){return m.title;}).join(", ")]);
  if(t.wins.length)secs.push(["Highlights & wins",t.wins.join("\n")]);
  if(s.growth&&s.growth.goal)secs.push(["Growth goal",s.growth.goal]);
  secs.push(["From your service delivery manager","Keep it up \u2014 we see it, and the client does too."]);
  var html=docShell(title,sub,secs);var fname="Recognition_"+(s.tech||"tech").replace(/\s+/g,"-")+"_"+today();
  if(mode==="word")downloadHtmlDoc(fname,html);else if(mode==="print")openPrint(html);else{downloadHtmlDoc(fname,html);emailDoc("",title,"Hi "+(s.tech||"")+",\n\nA small note of recognition \u2014 the document has downloaded, please find it attached.\n\nThank you,\n"+((state.me&&state.me.name)||"DedicatusIT"));}}
function editSLog(aid,sid,idx){const s=getS(getA(aid),sid);const l=s.log[idx];if(!l)return;const v=window.prompt("Edit note:",l.note);if(v===null)return;l.note=v;save();reSeat(aid,sid);}
function delSLog(aid,sid,idx){if(!confirm("Delete this log entry?"))return;const s=getS(getA(aid),sid);s.log.splice(idx,1);save();reSeat(aid,sid);}
function editALog(aid,idx){const a=getA(aid);const l=a.log[idx];if(!l)return;const v=window.prompt("Edit note:",l.note);if(v===null)return;l.note=v;save();reAcct(aid);}
function delALog(aid,idx){if(!confirm("Delete this log entry?"))return;const a=getA(aid);a.log.splice(idx,1);save();reAcct(aid);}
function delExp(aid,idx){if(!confirm("Delete this expansion signal?"))return;const a=getA(aid);a.expansion.splice(idx,1);save();reAcct(aid);}
function setQBRNotes(aid,v){getA(aid).qbr.notes=v;save();}
function addAExp(aid){const v=document.getElementById("aexpIn").value.trim();if(!v)return;const a=getA(aid);a.expansion.push({date:today(),note:v});a.log.push({date:today(),type:"expansion",note:v});save();reAcct(aid);}
function addANote(aid){const v=document.getElementById("anoteIn").value.trim();if(!v)return;const a=getA(aid);a.log.push({date:today(),type:"note",note:v});save();reAcct(aid);}
function delAcct(aid){if(!confirm("Delete this MSP and all its seats?"))return;state.accounts=state.accounts.filter(a=>a.id!==aid);save();showPanel(false);render();}

function saveSeat(aid,sid){const g=k=>document.getElementById("f_"+k).value.trim();const a=getA(aid);let s=sid?getS(a,sid):blankSeat();
  s.tech=g("tech");s.title=g("title");s.band=g("band");s.started=g("started");s.rate=g("rate");s.renewal=g("renewal");var fsel=document.getElementById("f_freqsel");var fc=document.getElementById("f_freqcustom");var fvv=fsel?fsel.value:"14";s.cadence.freq=(fvv==="custom")?(parseInt(fc&&fc.value)||14):(parseInt(fvv)||14);recomputeCad(s);
  if(!sid)a.seats.push(s);save();openSeat(aid,s.id);}

  '<div class="eyebrow">The one idea</div><h3 style="margin-top:4px">Make the MSP never want to do it without us</h3>'+

  '<h3>You own / the MSP owns</h3><ul><li><b>We own:</b> relationship health (both sides), the tech\'s growth &amp; retention, quality, continuity, coverage, the cadence, expansion.</li><li><b>MSP owns:</b> direction, roster, leave, priorities, tools, day-to-day feedback.</li></ul>'+
  '<h3>The gap detector</h3><p>Signs a tech is struggling the MSP won\'t report: going quiet, shorter answers, less initiative; working past hours; stopped asking questions; unnamed friction. Catch one early.</p>'+
  '<h3>Metrics that matter</h3><p>Seat health (both sides), tech tenure, renewal &amp; expansion, continuity readiness, cadence adherence. <b>Not</b> ticket throughput.</p>'+
  '<p class="muted xs" style="margin-top:14px">The full SDOS Playbook, Service Doctrine and Templates are kept privately offline.</p>'+
  '</div>';}

(function(){var map=[
  ["Environment summary","systems"],["Key systems OS applications","systems"],["Key systems os applications","systems"],

];map.forEach(function(p){HEADING_MAP[normHead(p[0])]=p[1];});})();

function appendSection(seat,sec,article,text){
  var prev=(seat.backfill[sec]&&seat.backfill[sec].text)?seat.backfill[sec].text+"\n\n":"";
  var stamp='— from "'+(article.title||'article')+'" ('+(article.author||'tech')+', '+today()+'):\n';

function routeArticleToContinuity(seat,article){
  var route=article.route||"auto";
  if(route==="none")return [];
  var text=(article.body||"").trim();if(!text)return [];
  // explicit target section chosen by the SDM — whole article goes there
  if(route!=="auto"){appendSection(seat,route,article,text);return [route];}
  // auto: split by the template's own headings
  var lines=text.split(/\r?\n/);var chunks={};var cur=null;var matched=false;
  for(var i=0;i<lines.length;i++){var raw=lines[i];var nh=normHead(raw);
    if(nh&&HEADING_MAP[nh]){cur=HEADING_MAP[nh];matched=true;if(!chunks[cur])chunks[cur]=[];continue;}
    if(cur){chunks[cur].push(raw);}}
  if(matched){var filled=[];Object.keys(chunks).forEach(function(sec){var t=chunks[sec].join("\n").trim();if(!t)return;appendSection(seat,sec,article,t);filled.push(sec);});return filled;}
  // no headings matched — fall back to the template CODE, never a blind guess
  var code=article.code||(parseArticleTag(text).code)||"";
  var sec=CODE_ROUTE[code];
  if(sec){appendSection(seat,sec,article,text);return [sec];}
  return []; // can't determine safely → leave it; saveModule will prompt the SDM to pick
}

  var html=docShell(title,sub,secs);var fname="QBR_"+(a.name||"account").replace(/\s+/g,"-")+"_"+e.date;
  if(mode==="word")downloadHtmlDoc(fname,html);else if(mode==="print")openPrint(html);
  else{downloadHtmlDoc(fname,html);emailDoc("",title+" ("+fmt(e.date)+")","Hi,\n\nPlease find the QBR for "+(a.name||"")+" covering "+sub+".\n\n(The document has downloaded — attach it to this email.)\n\nThanks,\n"+((state.me&&state.me.name)||"DedicatusIT"));}
}
function qbrHistory(aid){
  var a=getA(aid);a.qbrLog=a.qbrLog||[];if(!a.qbrLog.length)return '<div class="muted sm" style="margin-top:10px">No QBRs recorded yet.</div>';
  var months=monthsList(a.qbrLog);
  var ctrl='<div class="row" style="margin:12px 0 4px;gap:6px"><input id="qf_sq" placeholder="Search QBRs…" oninput="filterQbr(\''+aid+'\')" style="flex:2;min-width:120px"><select id="qf_sm" onchange="filterQbr(\''+aid+'\')" style="flex:1;min-width:120px"><option value="">All months</option>'+months.map(function(m){return '<option value="'+m+'">'+monthLabel(m)+'</option>';}).join('')+'</select></div>';
  return ctrl+'<div id="qbrhist">'+renderQbrList(aid,"","")+'</div>';
}
function filterQbr(aid){var q=(document.getElementById("qf_sq")||{}).value||"";var m=(document.getElementById("qf_sm")||{}).value||"";var c=document.getElementById("qbrhist");if(c)c.innerHTML=renderQbrList(aid,q,m);}
function renderQbrList(aid,q,m){
  var a=getA(aid);var entries=(a.qbrLog||[]);q=(q||"").toLowerCase();
  var list=entries.slice().sort(function(x,y){return (x.date<y.date)?1:-1;}).filter(function(e){if(m&&(e.date||"").slice(0,7)!==m)return false;if(q){var blob=(e.date+" "+QBRQ.map(function(x){return e[x[0]]||"";}).join(" ")).toLowerCase();if(blob.indexOf(q)<0)return false;}return true;});
  if(!list.length)return '<div class="muted sm" style="margin-top:8px">No QBRs match.</div>';
  return list.map(function(e){return '<div class="logitem"><div class="row" style="justify-content:space-between;align-items:center"><span class="d">'+fmt(e.date)+(e.satisfaction?' · '+e.satisfaction:'')+'</span><span>'+
    '<button class="btn sm ghost" style="padding:2px 7px" onclick="qbrDoc(\''+aid+'\',\''+e.id+'\',\'print\')">PDF</button> '+
    '<button class="btn sm ghost" style="padding:2px 7px" onclick="qbrDoc(\''+aid+'\',\''+e.id+'\',\'word\')">Word</button> '+
    '<button class="btn sm ghost" style="padding:2px 7px" onclick="qbrDoc(\''+aid+'\',\''+e.id+'\',\'send\')">Send</button> '+
    '<button class="btn sm ghost" style="padding:2px 7px" onclick="openQbrForm(\''+aid+'\',\''+e.id+'\')">Edit</button> '+
    '<button class="btn sm ghost" style="padding:2px 7px;color:#ffb4b4" onclick="delQbr(\''+aid+'\',\''+e.id+'\')">Del</button></span></div>'+
    '<div class="muted xs" style="margin-top:4px">Period '+(e.from?fmt(e.from):'start')+' → '+fmt(e.to||e.date)+'</div>'+
    QBRQ.map(function(x){return e[x[0]]?'<div style="margin-top:5px"><span class="muted xs">'+esc(x[1])+'</span><br>'+esc(e[x[0]])+'</div>':'';}).join('')+'</div>';}).join('');
}
load(); go("dashboard"); GD.init();
if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(()=>{});}
